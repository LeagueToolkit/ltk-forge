commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}

pre-commit:
  parallel: true
  commands:
    eslint:
      glob: "*.{ts,tsx}"
      run: pnpm exec eslint --fix {staged_files}
      stage_fixed: true

    prettier:
      glob: "*.{ts,tsx,json,css,md,yml,yaml}"
      run: pnpm exec prettier --write {staged_files}
      stage_fixed: true

    cargo-fmt:
      glob: "*.rs"
      run: cargo fmt --all
